<svg width="860" height="540" viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Arial', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="860" height="540" rx="16" fill="#F8F9FA"/>

  <!-- ══════════════════════════════════════════
       LAYER 1 — Edge Device
  ══════════════════════════════════════════ -->
  <rect x="20" y="20" width="360" height="120" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="36" y="42" font-size="11" font-weight="600" fill="#1E40AF" letter-spacing="0.5">LỚP THIẾT BỊ  (Edge Layer)</text>

  <!-- DS18B20 -->
  <rect x="36" y="56" width="130" height="64" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="101" y="82" font-size="13" font-weight="700" fill="#1D4ED8" text-anchor="middle">DS18B20</text>
  <text x="101" y="99" font-size="10.5" fill="#3B82F6" text-anchor="middle">Cảm biến nhiệt độ</text>
  <text x="101" y="113" font-size="10" fill="#6B7280" text-anchor="middle">±0.5°C · One-Wire</text>

  <!-- Arrow One-Wire -->
  <line x1="166" y1="88" x2="204" y2="88" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="185" y="82" font-size="9.5" fill="#3B82F6" text-anchor="middle">One-Wire</text>

  <!-- ESP32 -->
  <rect x="204" y="56" width="158" height="64" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="283" y="82" font-size="13" font-weight="700" fill="#1D4ED8" text-anchor="middle">Vi điều khiển</text>
  <text x="283" y="99" font-size="13" font-weight="700" fill="#1D4ED8" text-anchor="middle">ESP32</text>
  <text x="283" y="113" font-size="10" fill="#6B7280" text-anchor="middle">WiFi · MQTT Publish</text>

  <!-- ══════════════════════════════════════════
       LAYER 2 — Network Layer
  ══════════════════════════════════════════ -->
  <rect x="20" y="180" width="360" height="100" rx="10" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.2"/>
  <text x="36" y="202" font-size="11" font-weight="600" fill="#6D28D9" letter-spacing="0.5">LỚP MẠNG  (Network Layer)</text>

  <!-- MQTT Broker -->
  <rect x="80" y="214" width="240" height="52" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="200" y="237" font-size="13" font-weight="700" fill="#6D28D9" text-anchor="middle">MQTT Broker</text>
  <text x="200" y="254" font-size="10.5" fill="#7C3AED" text-anchor="middle">HiveMQ Cloud</text>

  <!-- Arrow ESP32 → MQTT (vertical) -->
  <line x1="283" y1="120" x2="283" y2="176" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="302" y="153" font-size="9.5" fill="#3B82F6">WiFi / MQTT</text>

  <!-- ══════════════════════════════════════════
       LAYER 3 — Backend & Storage
  ══════════════════════════════════════════ -->
  <rect x="20" y="330" width="480" height="180" rx="10" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.2"/>
  <text x="36" y="352" font-size="11" font-weight="600" fill="#C2410C" letter-spacing="0.5">LỚP BACKEND &amp; LƯU TRỮ  (Server Layer)</text>

  <!-- Spring Boot -->
  <rect x="36" y="366" width="200" height="60" rx="8" fill="#FFEDD5" stroke="#FDBA74" stroke-width="1"/>
  <text x="136" y="391" font-size="13" font-weight="700" fill="#C2410C" text-anchor="middle">Spring Boot</text>
  <text x="136" y="408" font-size="10.5" fill="#EA580C" text-anchor="middle">Backend API · JWT · MQTT Sub</text>

  <!-- Arrow Spring Boot → MySQL -->
  <line x1="236" y1="396" x2="280" y2="396" stroke="#F97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- MySQL -->
  <rect x="280" y="366" width="190" height="60" rx="8" fill="#FFEDD5" stroke="#FDBA74" stroke-width="1"/>
  <text x="375" y="391" font-size="13" font-weight="700" fill="#C2410C" text-anchor="middle">MySQL Database</text>
  <text x="375" y="408" font-size="10.5" fill="#EA580C" text-anchor="middle">Lưu trữ log &amp; cảnh báo</text>

  <!-- Arrow Spring Boot → Email (down) -->
  <line x1="136" y1="426" x2="136" y2="458" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr-dash)"/>

  <!-- Email Service -->
  <rect x="36" y="458" width="200" height="38" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="136" y="480" font-size="11.5" font-weight="600" fill="#374151" text-anchor="middle">Email/SMS Service</text>
  <text x="136" y="493" font-size="10" fill="#6B7280" text-anchor="middle">Gmail SMTP · Cảnh báo khẩn</text>

  <!-- ══════════════════════════════════════════
       LAYER 4 — Client Layer
  ══════════════════════════════════════════ -->
  <rect x="530" y="20" width="310" height="490" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="546" y="42" font-size="11" font-weight="600" fill="#15803D" letter-spacing="0.5">LỚP ỨNG DỤNG  (Client Layer)</text>

  <!-- React Web Dashboard -->
  <rect x="552" y="60" width="270" height="80" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="687" y="88" font-size="13" font-weight="700" fill="#15803D" text-anchor="middle">React.js</text>
  <text x="687" y="106" font-size="11" fill="#16A34A" text-anchor="middle">Web Dashboard</text>
  <text x="687" y="122" font-size="10" fill="#6B7280" text-anchor="middle">Recharts · Grid · Drawer Alert</text>

  <!-- React Native Mobile -->
  <rect x="552" y="168" width="270" height="80" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="687" y="196" font-size="13" font-weight="700" fill="#15803D" text-anchor="middle">React Native</text>
  <text x="687" y="214" font-size="11" fill="#16A34A" text-anchor="middle">Mobile App</text>
  <text x="687" y="230" font-size="10" fill="#6B7280" text-anchor="middle">Expo · Android &amp; iOS</text>

  <!-- Docker Compose badge -->
  <rect x="552" y="280" width="270" height="200" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="687" y="304" font-size="11" font-weight="600" fill="#1D4ED8" text-anchor="middle">🐳  Docker Compose</text>
  <text x="687" y="322" font-size="10" fill="#6B7280" text-anchor="middle">Khởi động đồng thời</text>

  <rect x="572" y="334" width="230" height="36" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="0.8"/>
  <text x="687" y="354" font-size="11" font-weight="600" fill="#1D4ED8" text-anchor="middle">Spring Boot Backend</text>

  <rect x="572" y="380" width="230" height="36" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="0.8"/>
  <text x="687" y="400" font-size="11" font-weight="600" fill="#1D4ED8" text-anchor="middle">MySQL Database</text>

  <rect x="572" y="426" width="230" height="36" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="0.8"/>
  <text x="687" y="446" font-size="11" font-weight="600" fill="#15803D" text-anchor="middle">React.js Web Frontend</text>

  <text x="687" y="476" font-size="10" fill="#9CA3AF" text-anchor="middle">Mobile App: Expo (chạy thủ công)</text>

  <!-- ══════════════════════════════════════════
       CONNECTORS: MQTT Broker → Spring Boot
  ══════════════════════════════════════════ -->
  <!-- Horizontal bend: broker right → backend -->
  <path d="M320 240 L480 240 L480 396 L470 396" fill="none" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5 3"/>
  <!-- label -->
  <text x="462" y="232" font-size="9.5" fill="#7C3AED" text-anchor="middle">Subscribe Topic</text>

  <!-- ══════════════════════════════════════════
       CONNECTORS: Spring Boot → React (RESTful)
  ══════════════════════════════════════════ -->
  <path d="M136 366 L136 310 L530 310 L530 100 L552 100" fill="none" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5 3"/>
  <text x="390" y="302" font-size="9.5" fill="#16A34A" text-anchor="middle">RESTful API</text>

  <!-- CONNECTORS: Spring Boot → Mobile -->
  <path d="M236 410 L500 410 L500 208 L552 208" fill="none" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5 3"/>

  <!-- ══════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════ -->
  <rect x="20" y="516" width="500" height="18" rx="4" fill="none"/>
  <line x1="28" y1="525" x2="58" y2="525" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="64" y="529" font-size="10" fill="#6B7280">Luồng dữ liệu liên tục</text>
  <line x1="200" y1="525" x2="230" y2="525" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-dash)"/>
  <text x="236" y="529" font-size="10" fill="#6B7280">Gọi có điều kiện (API / cảnh báo)</text>
</svg>
