version: '3.8'

services:

  # Database
  mysql:
    image: mysql:8.0
    container_name: fridge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medical_fridge
      MYSQL_USER: fridge_user
      MYSQL_PASSWORD: fridge_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot
  backend:
    build:
      context: ./backend-springboot
      dockerfile: Dockerfile
    container_name: fridge-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/medical_fridge
      SPRING_DATASOURCE_USERNAME: fridge_user
      SPRING_DATASOURCE_PASSWORD: fridge_pass
    depends_on:
      mysql:
        condition: service_healthy   # Chờ MySQL sẵn sàng mới start
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: fridge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data: