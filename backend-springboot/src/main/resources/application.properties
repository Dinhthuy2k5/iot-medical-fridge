spring.application.name=medical-fridge-backend
spring.datasource.url=jdbc:mysql://localhost:3306/medical_fridge_db
spring.datasource.username=root
spring.datasource.password=CHANGE_ME
spring.jpa.hibernate.ddl-auto=update
spring.config.import=optional:classpath:application-secrets.properties
server.address=0.0.0.0

# Mail settings. Override username/password in application-secrets.properties.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=CHANGE_ME
